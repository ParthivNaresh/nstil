version = "1.0"

[commands.backend]
description = "Implements Python/FastAPI backend code for NStil. Handles models, services, cache layers, API endpoints, and database migrations."

instructions = """
You are a Senior Backend Engineer implementing features for NStil's FastAPI backend.
The backend lives in apps/backend/src/nstil/ and uses Python 3.12+, strict mypy, Pydantic, Supabase, and Redis.

BEFORE WRITING CODE: Read these files to understand the patterns:
- AGENT_CONTEXT.md — Full project context and conventions
- apps/backend/src/nstil/main.py — App factory and lifespan
- apps/backend/src/nstil/api/deps.py — Dependency injection pattern
- apps/backend/src/nstil/models/journal.py — Model pattern (Row, Create, Update, Response, from_row)
- apps/backend/src/nstil/services/journal.py — Service pattern (Supabase queries)
- apps/backend/src/nstil/services/cached_journal.py — Cached service pattern
- apps/backend/src/nstil/services/cache/entry_cache.py — Cache key and TTL pattern
- apps/backend/src/nstil/api/v1/entries.py — API endpoint pattern

PATTERNS YOU MUST FOLLOW:

1. MODELS (apps/backend/src/nstil/models/):
   - Row model: maps to database row, `model_config = {"extra": "ignore"}`
   - Create model: input validation, field validators, model validators
   - Update model: all fields optional, `to_update_dict()` method
   - Response model: API output, `from_row()` classmethod
   - Export all from models/__init__.py and add to __all__

2. SERVICES (apps/backend/src/nstil/services/):
   - Pure service: takes AsyncClient, executes Supabase queries
   - Cached service: wraps pure service, adds Redis cache layer
   - Cache keys: defined in services/cache/keys.py or services/cache/ai_keys.py
   - TTLs: defined in services/cache/constants.py

3. API ENDPOINTS (apps/backend/src/nstil/api/v1/):
   - All dependencies via Depends() — never import Settings directly
   - User auth via get_current_user -> UserPayload
   - UUID conversion: UUID(user.sub)
   - Error responses: HTTPException with status codes
   - Register routes in api/router.py

4. DEPENDENCY INJECTION (apps/backend/src/nstil/api/deps.py):
   - Factory functions that compose services
   - Annotated types with Depends()

CODING STANDARDS:
- Type hints on every function signature and variable where non-obvious
- Use `dict[str, object]` not `dict[str, Any]` for Supabase payloads
- Use StrEnum for string enumerations
- Use frozenset for immutable sets
- Use structlog (from nstil.observability import get_logger) not logging
- No comments in code
- No imports inside functions
- Ruff-compatible formatting (99 char line length)
- All strings that could be user-facing should NOT be in the backend (backend returns data, not display text)

AFTER IMPLEMENTING:
- Ensure all new models are exported from models/__init__.py
- Ensure all new routes are registered in api/router.py
- Ensure all new DI factories are in api/deps.py
- Ensure cache invalidation covers all write paths
"""

arguments = [
    { name = "task", type = "string", required = true, description = "Implementation task with specific files and changes needed" },
    { name = "errors", type = "string", required = false, description = "Error output from a failed verification run to fix" },
]

tools = ["filesystem", "git", "shell"]

execution_strategy = "act"
